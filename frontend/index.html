<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevForum  - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- THEME TOGGLE -->
<div class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
    <span class="toggle-icon">☀️</span>
</div>

<div class="login-container">
    <div class="login-card">
        <h2>Welcome to DevForum </h2>
        <p class="login-subtitle">Connect with developers worldwide</p>

        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>

        <button onclick="login()">Sign In</button>

        <div id="message" class="error-message"></div>

        <p class="signup-link">New here? <a href="#" onclick="showRegister()">Create an account</a></p>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
